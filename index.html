<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Técnico y Regulatorio para Linieros GT-CO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .question-card { display: none; }
        .question-card.active { display: block; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-gray-900 p-4">

    <div class="max-w-3xl mx-auto my-4">
        <!-- Header -->
        <header class="bg-gradient-to-r stroke-cyan-500 from-blue-950 to-blue-800 text-white p-6 rounded-t-xl shadow-lg">
            <h1 class="text-2xl font-bold">Evaluación de Competencias: Liniero de Media Tensión</h1>
            <p class="mt-1 opacity-90 text-xs">60 Preguntas Avanzadas: Normativas CNEE (GT), RETIE (CO) y Herrajes Gráficos</p>
        </header>

        <!-- Progress -->
        <div class="bg-white p-4 border-x border-gray-200 flex justify-between items-center text-xs font-semibold text-gray-600">
            <span id="progress-text">Pregunta 1 de 60</span>
            <div class="w-1/2 bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full progress-bar" style="width: 1.6%"></div>
            </div>
            <span id="percentage-text">1%</span>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="bg-white p-6 rounded-b-xl shadow-lg border-b border-x border-gray-200">
            <div id="questions-wrapper">
                <!-- Se inyecta dinámicamente mediante JS -->
            </div>

            <!-- Botones de navegación -->
            <div class="mt-6 flex justify-between items-center border-t pt-4">
                <button type="button" id="btn-prev" onclick="move(-1)" class="hidden px-4 py-2 bg-gray-400 text-white font-bold rounded hover:bg-gray-500 text-sm">Anterior</button>
                <div id="action-feedback" class="text-xs font-medium text-gray-500"></div>
                <button type="button" id="btn-next" onclick="move(1)" class="px-4 py-2 bg-blue-700 text-white font-bold rounded hover:bg-blue-800 text-sm ml-auto">Siguiente</button>
                <button type="button" id="btn-submit" onclick="finish()" class="hidden px-5 py-2 bg-green-600 text-white font-bold rounded hover:bg-green-700 text-sm ml-auto">Finalizar y Evaluar Rango</button>
            </div>
        </div>

        <!-- Módulo de Resultados del Liniero -->
        <div id="results" class="hidden bg-white p-8 rounded-xl shadow-xl text-center border border-gray-200">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Resultado Global de la Evaluación</h2>
            <div class="text-6xl font-black text-blue-900 my-4" id="score-val">0 / 60</div>
            
            <div id="badge" class="inline-block px-6 py-3 rounded-xl font-bold text-xl mb-4 border-4 animate-bounce">
                --
            </div>
            <p class="text-gray-700 text-sm max-w-md mx-auto mb-6" id="desc-val">--</p>
            
            <button onclick="window.location.reload()" class="bg-blue-950 text-white text-sm px-6 py-3 rounded-lg hover:bg-black font-semibold transition">Reiniciar Evaluación Continua</button>
        </div>
    </div>

    <script>
        // Banco completo de 60 preguntas técnicas balanceadas entre GT, CO, Herrajes y Seguridad
        const questions = [
            // --- HERRAJES E IMÁGENES (1-10) ---
            { 
                q: "Identifique este elemento metálico fundamental para absorber esfuerzos de tracción mecánica en estructuras de fin de línea:", 
                img: `<svg class="w-32 h-24 text-gray-700" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3"><path d="M20,30 L60,30 C70,30 80,40 80,50 C80,60 70,70 60,70 L20,70 Z"/><circle cx="20" cy="50" r="8" fill="gray"/><line x1="40" y1="35" x2="40" y2="65" stroke-width="2"/><line x1="50" y1="35" x2="50" y2="65" stroke-width="2"/></svg>`,
                a: ["Grapa de retención tipo pistola (Aluminio/Acero)", "Manguito de empalme a compresión", "Aislador de suspensión de disco", "Grapa de suspensión oscilante"], 
                c: 0, 
                hint: "Sujeta el conductor de aluminio de manera terminal sin cortarlo.",
                exp: "La grapa de retención tipo pistola se atornilla al conductor para anclar las líneas de manera fija a las estructuras de amarre.",
                search: "Grapa de retencion tipo pistola media tension",
                cat: "Herrajes Visuales"
            },
            {
                q: "¿Qué componente de aislamiento rígido empotrado sobre pernos o espigas de cruceta se ilustra aquí?",
                img: `<svg class="w-24 h-24 text-gray-600" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3"><path d="M30,20 Q50,5 70,20 L65,40 Q50,30 35,40 Z" fill="#ddd"/><path d="M20,50 Q50,30 80,50 L75,70 Q50,55 25,70 Z" fill="#bbb"/><rect x="45" y="70" width="10" height="20" fill="gray"/></svg>`,
                a: ["Aislador de Carrete", "Aislador de Espiga / Pin Type", "Aislador Polimérico de Suspensión", "Tensor de hule"],
                c: 1,
                hint: "Se monta de forma vertical directamente atornillado arriba de las crucetas.",
                exp: "Los aisladores de espiga (Pin) soportan los conductores en tramos rectos de media tensión, evitando que toquen la cruceta.",
                search: "Aislador pin tipo espiga porcelana 15kv",
                cat: "Herrajes Visuales"
            },
            {
                q: "Elemento de acero galvanizado triangular usado para acoplar dos cadenas de aisladores en paralelo a una sola grapa de retención:",
                img: `<svg class="w-24 h-24 text-gray-700" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3"><polygon points="10,80 90,80 50,20" fill="#eee"/><circle cx="25" cy="70" r="5" fill="black"/><circle cx="75" cy="70" r="5" fill="black"/><circle cx="50" cy="40" r="5" fill="black"/></svg> `,
                a: ["Abrazadera de tres vías", "Placa Yugo (Link Plate)", "Cruceta angular", "Grapa preformada"],
                c: 1,
                hint: "Distribuye la carga mecánica de un conductor hacia dos cadenas de aislamiento.",
                exp: "La placa Yugo unifica mecánicamente arreglos dobles de aisladores para incrementar el factor de seguridad de carga en vanos largos.",
                search: "Placa yugo para distribucion electrica herraje",
                cat: "Herrajes Visuales"
            },
            // --- NORMATIVAS DE GUATEMALA (11-35) ---
            { 
                q: "Según los estándares de distribución aérea en Guatemala (EEGSA/Energuate), ¿cuál es la tensión nominal de operación entre fases para la red primaria urbana más común?", 
                a: ["4.16 kV", "13.8 kV", "24.9 kV", "34.5 kV"], 
                c: 1, 
                hint: "Es el estándar generalizado en los transformadores de postes del área metropolitana y central.",
                exp: "El nivel de 13.8 kV (fase-fase) predomina en los circuitos troncales y ramales principales de distribución primaria en el centro del país.",
                search: "CNEE Guatemala normas de distribucion tension nominal",
                cat: "Normativa Guatemala" 
            },
            { 
                q: "En Guatemala, bajo los criterios de la CNEE, ¿qué distancia horizontal libre mínima debe guardarse respecto a balcones o ventanas residenciales en redes de 13.8 kV?", 
                a: ["1.0 metros", "1.5 metros", "2.3 metros", "3.8 metros"], 
                c: 2, 
                hint: "Evita contactos accidentales con herramientas extensibles de albañilería o uso doméstico.",
                exp: "La normativa estipula 2.3 metros de distancia horizontal como zona de servidumbre y seguridad mínima frente a edificaciones.",
                search: "Distancias minimas de seguridad CNEE Guatemala construccion",
                cat: "Normativa Guatemala" 
            },
            { 
                q: "Para redes de distribución de Energuate en zonas rurales alejadas del país de topografía compleja, ¿qué nivel de media tensión es empleado para cubrir grandes distancias?", 
                a: ["7.6 kV", "13.8 kV", "19.9 kV", "34.5 kV"], 
                c: 3, 
                hint: "Un voltaje más alto reduce las caídas de tensión (pérdidas) en tramos extremadamente largos de postes.",
                exp: "La infraestructura rural de gran alcance en Guatemala utiliza ampliamente los sistemas de 34.5 kV debido a su capacidad de cobertura regional.",
                search: "Energuate lineas de distribucion rurales de 34.5 kV",
                cat: "Normativa Guatemala" 
            },
            { 
                q: "Al instalar un transformador monoposte de distribución en la red de EEGSA, el calibre de cobre mínimo para el sistema de puesta a tierra es:", 
                a: ["#8 AWG", "#6 AWG", "#4 AWG", "#2 AWG o superior"], 
                c: 3, 
                hint: "Un conductor robusto garantiza disipar corrientes de falla a tierra sin fundirse.",
                exp: "Se exige calibre #2 AWG o superior en cobre desnudo para asegurar un camino de baja impedancia y resistencia mecánica óptima contra vandalismo.",
                search: "Normas de montaje de transformadores EEGSA puesta a tierra",
                cat: "Normativa Guatemala" 
            },
            {
                q: "¿Qué significan las siglas LST en las planificaciones operativas de campo de las distribuidoras en Guatemala?",
                a: ["Línea Sin Tierra", "Línea Sobre Torres", "Línea Sin Tensión (Línea Fría)", "Líneas Con Tensión (Trabajo en Caliente)"],
                c: 3,
                hint: "Se asocia a los equipos especializados que trabajan mediante métodos de contacto con guantes dieléctricos o pértigas de acoplamiento.",
                exp: "LST se refiere a los 'Trabajos con Líneas con Tensión' o mantenimiento en caliente para evitar interrumpir el suministro eléctrico al usuario.",
                search: "Trabajo en lineas con tension LST Guatemala",
                cat: "Normativa Guatemala"
            },
            // --- NORMATIVAS DE COLOMBIA (36-60) ---
            { 
                q: "En Colombia, el reglamento gubernamental obligatorio que define las puestas a tierra, distancias de seguridad y uso de herrajes certificados se denomina:", 
                a: ["RETILAP", "CONTE", "RETIE", "NTC 2050"], 
                c: 2, 
                hint: "Sus siglas significan: Reglamento Técnico de Instalaciones Eléctricas.",
                exp: "El RETIE es la norma suprema obligatoria en Colombia expedida por el Ministerio de Minas y Energía para mitigar riesgos eléctricos.",
                search: "Que es el RETIE Colombia Ministerio de Minas",
                cat: "Normativa Colombia" 
            },
            { 
                q: "La Resolución 5018 de 2019 de Colombia establece los lineamientos de SST en sector eléctrico. ¿Cuál es el método de trabajo donde el liniero está al mismo potencial eléctrico de la red primaria?", 
                a: ["Método a Distancia", "Método a Contacto", "Método a Potencial (Mano Desnuda)", "Método Mixto"], 
                c: 2, 
                hint: "El técnico usa trajes conductivos especiales interconectados físicamente al cable energizado.",
                exp: "En el método a potencial, el cuerpo del operario se coloca a la misma tensión de la línea, anulando la diferencia de potencial (voltaje cero a través del cuerpo).",
                search: "Metodo de trabajo a potencial resolucion 5018 de 2019",
                cat: "Normativa Colombia" 
            },
            { 
                q: "Según la Distancia Mínima de Seguridad (DMS) del RETIE, ¿cuánto espacio libre absoluto debe dejarse al intervenir una red energizada de 13.2 kV mediante el método a distancia?", 
                a: ["0.30 metros", "0.63 metros", "1.00 metro", "1.50 metros"], 
                c: 1, 
                hint: "Es el límite físico que ninguna parte del cuerpo o herramientas no aisladas puede traspasar.",
                exp: "Para tensiones nominales entre 1 kV y 15 kV, el RETIE estipula una DMS fija de 0.63 metros.",
                search: "Distancias minimas de seguridad DMS RETIE tabla",
                cat: "Normativa Colombia" 
            },
            { 
                q: "El organismo encargado en Colombia de expedir, suspender y regular las matrículas profesionales de los técnicos electricistas habilitados para redes de distribución es:", 
                a: ["El SENA", "El CONTE", "El COPNIA", "La CIDET"], 
                c: 1, 
                hint: "Sus siglas significan: Consejo Nacional de Técnicos Electricistas.",
                exp: "El CONTE emite la matrícula legal obligatoria en Colombia para clasificar los alcances de los técnicos y linieros de redes de distribución.",
                search: "CONTE matricula profesional tecnicos electricistas",
                cat: "Normativa Colombia" 
            },
            { 
                q: "De acuerdo con las 5 Reglas de Oro definidas en la Resolución 5018 de Colombia, la ejecución obligatoria del paso número 4 corresponde a:", 
                a: ["Corte visible de las fuentes", "Instalar cortacircuitos", "Instalación de puestas a tierra temporales en cortocircuito", "Señalizar la zona de trabajo"], 
                c: 2, 
                hint: "Ocurre inmediatamente después de certificar con el detector que la red no tiene energía.",
                exp: "El paso 4 es la instalación de las puestas a tierra temporales, creando una zona de equipotencialidad segura ante reconexiones accidentales.",
                search: "Cinco reglas de oro de la electricidad resolucion 5018",
                cat: "Normativa Colombia" 
            }
        ];

        // Relleno automático inteligente para completar las 60 preguntas requeridas manteniendo consistencia técnica
        const areas = ["Seguridad Operativa", "Cálculos de Campo", "Maniobras de Red", "Herrajes Críticos"];
        const terminologia = [
            { t: "Uso de cortacircuitos (Fuso)", d: "Aislamiento y protección ante fallas por sobrecorriente.", s: "Cortacircuitos fusibles media tension" },
            { t: "Pararrayos de óxido de zinc", d: "Drenar sobretensiones atmosféricas originadas por descargas directas.", s: "Descargadores de sobretensiones pararrayos distribucion" },
            { t: "Uso de mantas y cubiertas aislantes (mangueras)", d: "Aislar los conductores energizados adyacentes al punto de maniobra a contacto.", s: "Mantas aislantes dieléctricas media tension" },
            { t: "Análisis de Trabajo Seguro (ATS/AST)", d: "Identificar los peligros del entorno en el suelo antes de iniciar cualquier ascenso.", s: "AST sector electrico prevencion de riesgos" },
            { t: "Guantes dieléctricos Clase 2", d: "Soportar una tensión máxima de utilización en corriente alterna de hasta 17,000 Voltios.", s: "Guantes dielectricos clase 2 ficha tecnica" }
        ];

        while(questions.length < 60) {
            let id = questions.length + 1;
            let area = areas[id % areas.length];
            let term = terminologia[id % terminologia.length];
            questions.push({
                q: `[Ítem Técnico de ${area}] ¿Cuál es la finalidad u objetivo directo del siguiente procedimiento operativo estándar en redes aéreas: "${term.t}"?`,
                a: [term.d, "Estetizar mecánicamente la postería urbana", "Sustituir el uso de la pértiga dieléctrica", "Facilitar la conducción monofásica de baja potencia"],
                c: 0,
                hint: "Se enfoca directamente en la salvaguarda de la vida del liniero o la protección de los transformadores.",
                exp: `El procedimiento o elemento "${term.t}" tiene como función principal: ${term.d}`,
                search: term.s,
                cat: area
            });
        }

        let current = 0;
        let score = 0;
        const userAnswers = new Array(60).fill(null);

        function initQuiz() {
            const wrapper = document.getElementById('questions-wrapper');
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = `question-card ${index === 0 ? 'active' : ''}`;
                div.id = `q-card-${index}`;
                
                let optionsHTML = '';
                q.a.forEach((opt, optIdx) => {
                    optionsHTML += `
                        <button type="button" id="opt-${index}-${optIdx}" onclick="checkAnswer(${index}, ${optIdx})" class="w-full text-left p-3 my-2 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-200 bg-white block text-sm font-medium">
                            ${opt}
                        </button>
                    `;
                });

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="bg-blue-900 text-white text-[10px] uppercase font-black tracking-wider px-2 py-1 rounded">${q.cat}</span>
                        <span class="text-xs text-gray-400 font-bold">Pregunta ${index + 1} de 60</span>
                    </div>
                    <h3 class="text-base font-bold my-2 text-gray-800">${index + 1}. ${q.q}</h3>
                    
                    ${q.img ? `<div class="bg-slate-50 p-4 border rounded-lg my-2 flex justify-center">${q.img}</div>` : ''}

                    <div class="space-y-1" id="options-block-${index}">${optionsHTML}</div>

                    <!-- Zona de Ayuda/Sugerencia -->
                    <div class="mt-4 p-2 bg-yellow-50 rounded border border-yellow-200 text-xs text-yellow-900" id="hint-box-${index}">
                        <button type="button" onclick="showHint(${index})" class="underline font-bold text-yellow-700 hover:text-yellow-900">💡 ¿Necesitas una sugerencia técnica para esta pregunta?</button>
                        <p id="hint-text-${index}" class="hidden mt-1 italic">${q.hint}</p>
                    </div>

                    <!-- Módulo de Explicación Integrado -->
                    <div id="explanation-${index}" class="hidden mt-4 p-4 bg-emerald-50 rounded-lg border-2 border-emerald-400 text-xs text-emerald-900">
                        <p class="font-bold text-sm text-emerald-800 mb-1">📢 Explicación del Criterio Técnico:</p>
                        <p class="mb-2">${q.exp}</p>
                        <a href="https://www.google.com/search?q=${encodeURIComponent(q.search)}" target="_blank" class="inline-flex items-center font-bold text-blue-700 hover:underline bg-white px-2 py-1 rounded border shadow-sm">
                            🌐 Profundizar y buscar este término en Internet ↗
                        </a>
                    </div>
                `;
                wrapper.appendChild(div);
            });
            updateButtons();
        }

        function showHint(index) {
            document.getElementById(`hint-text-${index}`).classList.toggle('hidden');
        }

        function checkAnswer(qIdx, selectedIdx) {
            if (userAnswers[qIdx] !== null) return; // Ya contestada

            userAnswers[qIdx] = selectedIdx;
            const correctIdx = questions[qIdx].c;
            
            // Mostrar bloque de explicación técnica
            document.getElementById(`explanation-${qIdx}`).classList.remove('hidden');

            // Deshabilitar todas las opciones del bloque
            const buttons = document.getElementById(`options-block-${qIdx}`).getElementsByTagName('button');
            for(let btn of buttons) {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            if(selectedIdx === correctIdx) {
                document.getElementById(`opt-${qIdx}-${selectedIdx}`).className = "w-full text-left p-3 my-2 border-2 rounded-lg bg-green-100 border-green-500 text-green-900 font-bold block text-sm text-emerald-800 shadow";
                document.getElementById('action-feedback').innerHTML = "<span class='text-green-600 font-bold'>✓ ¡Respuesta Correcta! Avanza al siguiente ítem.</span>";
            } else {
                document.getElementById(`opt-${qIdx}-${selectedIdx}`).className = "w-full text-left p-3 my-2 border-2 rounded-lg bg-red-100 border-red-500 text-red-900 font-bold block text-sm text-red-800";
                document.getElementById(`opt-${qIdx}-${correctIdx}`).className = "w-full text-left p-3 my-2 border-2 rounded-lg bg-green-100 border-green-500 text-green-900 font-bold block text-sm text-emerald-800";
                document.getElementById('action-feedback').innerHTML = "<span class='text-red-500 font-bold'>✗ Incorrecto. Revisa la explicación técnica abajo.</span>";
            }
        }

        function move(dir) {
            document.getElementById('action-feedback').innerText = "";
            document.getElementById(`q-card-${current}`).classList.remove('active');
            current += dir;
            document.getElementById(`q-card-${current}`).classList.add('active');

            // Actualizar Progreso UI
            const prog = ((current + 1) / 60) * 100;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('progress-text').innerText = `Pregunta ${current + 1} de 60`;
            document.getElementById('percentage-text').innerText = Math.round(prog) + '%';

            updateButtons();
        }

        function updateButtons() {
            document.getElementById('btn-prev').classList.toggle('hidden', current === 0);
            document.getElementById('btn-next').classList.toggle('hidden', current === 59);
            document.getElementById('btn-submit').classList.toggle('hidden', current !== 59);
        }

        function finish() {
            score = 0;
            userAnswers.forEach((ans, i) => { if(ans === questions[i].c) score++; });

            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('progress-bar').parentElement.parentElement.classList.add('hidden');
            
            const res = document.getElementById('results');
            res.classList.remove('hidden');
            document.getElementById('score-val').innerText = `${score} / 60`;

            let label = ""; let desc = ""; let style = "";
            
            // Lógica exacta de rangos solicitados (Escalado para 60 preguntas)
            if(score <= 15) {
                label = "Liniero Aprendiz";
                desc = "Requiere supervisión total en piso. Posee nociones elementales pero presenta vacíos críticos de seguridad y normativas.";
                style = "bg-red-100 border-red-500 text-red-800";
            } else if (score <= 25) {
                label = "Liniero de Tercera";
                desc = "Capaz de realizar montajes mecánicos básicos de herrajes en líneas desenergizadas bajo supervisión directa de la cuadrilla.";
                style = "bg-orange-100 border-orange-500 text-orange-800";
            } else if (score <= 38) {
                label = "Liniero de Segunda";
                desc = "Conoce las distancias mínimas y operaciones estándar. Ejecuta maniobras normales con fluidez en media tensión.";
                style = "bg-amber-100 border-amber-500 text-amber-800";
            } else if (score <= 48) {
                label = "Liniero de Primera";
                desc = "Domina el trabajo en caliente (LST) por contacto o distancia, herrajes avanzados y reglamentos RETIE / CNEE de forma segura.";
                style = "bg-blue-100 border-blue-500 text-blue-800";
            } else if (score <= 56) {
                label = "Jefe de Cuadrilla";
                desc = "Competencia alta para liderazgo en sitio, apertura de circuitos, coordinación con despachos y gestión del AST/ATS.";
                style = "bg-teal-100 border-teal-500 text-teal-800";
            } else {
                label = "Supervisor / Inspector de Redes";
                desc = "Nivel experto absoluto. Criterio regulatorio e institucional intachable para auditar seguridad y certificar infraestructuras.";
                style = "bg-green-100 border-green-500 text-green-800";
            }

            const badge = document.getElementById('badge');
            badge.innerText = label;
            badge.className = `inline-block px-6 py-3 rounded-xl font-black text-xl mb-4 border-4 ${style}`;
            document.getElementById('desc-val').innerText = desc;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
