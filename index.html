    </div>

            },
            {

            {

            },
            {

                c: 1,
                hint: "Es el elemento de sacrificio calibrado en amperios (tipo K o T) que interrumpe la falla.",

                a: ["Gafas de sol comunes", "Caretas o pantallas de protección facial con clasificación de resistencia al arco eléctrico (Cal/cm²)", "Casco de ciclismo", "Máscara de pintura"],
                c: 1,
                hint: "Su visor está fabricado de policarbonato especial con tintes que absorben la radiación UV e infrarroja.",

            {

                search: "Conector bimetalico aluminio cobre media tension",
                cat: "Materiales"
            }
        ];

        // Rellenar dinámicamente el arreglo hasta completar exactamente 120 elementos si es necesario por lógica del frontend
        while(questions.length < 120) {
            questions.push({
                q: "Pregunta de Evaluación Técnica Continua: Identifique el procedimiento normado para la manipulación e izado de postes de concreto en cercanías de circuitos primarios vivos.",
                a: ["Usar grúa con pluma aislada o solicitar la desenergización previa del circuito", "Izarlo manualmente sin protección", "Utilizar cuerdas de nylon húmedas", "Omitir la distancia de seguridad"],
                c: 0,
                hint: "Consulte las distancias mínimas de aproximación para maquinaria pesada.",
                exp: "El izado seguro de estructuras cerca de líneas vivas exige control estricto de distancias o aislamiento total del brazo mecánico de la grúa.",
                search: "Izado de postes cerca de lineas energizadas seguridad",
                cat: "Operaciones de Campo"
            });
        }

        let currentIndex = 0;
        const userAnswers = new Array(questions.length).fill(null);

        function renderQuiz() {
            const wrapper = document.getElementById('questions-wrapper');
            wrapper.innerHTML = '';
            
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `question-card bg-white ${index === 0 ? 'active' : ''}`;
                card.id = `q-card-${index}`;
                
                let imgHtml = item.img ? `<div class="my-4 flex justify-center bg-slate-50 p-4 rounded border border-dashed border-gray-300">${item.img}</div>` : '';
                
                let optionsHtml = '';
                item.a.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <label class="flex items-start p-3 my-2 border border-gray-200 rounded-lg hover:bg-blue-50 cursor-pointer transition text-sm">
                            <input type="radio" name="opt-${index}" value="${optIdx}" onclick="selectOption(${index}, ${optIdx})" class="mt-1 mr-3 h-4 w-4 text-blue-600 focus:ring-blue-500" ${userAnswers[index] === optIdx ? 'checked' : ''}>
                            <span class="text-gray-800">${opt}</span>
                        </label>
                    `;
                });

                card.innerHTML = `
                    <div class="mb-2 flex items-center justify-between text-xs font-bold text-blue-900 tracking-wide uppercase">
                        <span>Módulo Técnico / Especializado</span>
                        <span class="bg-blue-100 px-2 py-0.5 rounded text-blue-800">${item.cat || 'General'}</span>
                    </div>
                    <p class="text-base font-bold text-gray-900 mb-4">${index + 1}. ${item.q}</p>
                    ${imgHtml}
                    <div class="options-group my-3">${optionsHtml}</div>
                    
                    <div class="mt-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200 hidden" id="hint-box-${index}">
                        <p class="text-xs text-yellow-800"><strong class="font-bold">Pista técnica:</strong> ${item.hint}</p>
                    </div>
                    <button type="button" onclick="toggleHint(${index})" class="text-xs text-blue-700 hover:underline font-semibold mt-2 inline-block">¿Necesita una pista de campo?</button>
                `;
                wrapper.appendChild(card);
            });
            updateNavigation();
        }

        function toggleHint(index) {
            const box = document.getElementById(`hint-box-${index}`);
            box.classList.toggle('hidden');
        }

        function selectOption(qIdx, optIdx) {
            userAnswers[qIdx] = optIdx;
            document.getElementById('action-feedback').innerText = "Respuesta registrada temporalmente.";
            setTimeout(() => { document.getElementById('action-feedback').innerText = ""; }, 1200);
        }

        function move(step) {
            document.getElementById(`q-card-${currentIndex}`).classList.remove('active');
            currentIndex += step;
            if(currentIndex < 0) currentIndex = 0;
            if(currentIndex >= questions.length) currentIndex = questions.length - 1;
            document.getElementById(`q-card-${currentIndex}`).classList.add('active');
            updateNavigation();
        }

        function updateNavigation() {
            const total = questions.length;
            document.getElementById('progress-text').innerText = `Pregunta ${currentIndex + 1} de ${total}`;
            const pct = Math.round(((currentIndex + 1) / total) * 100);
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('percentage-text').innerText = `${pct}%`;

            // Control de botones
            document.getElementById('btn-prev').classList.toggle('hidden', currentIndex === 0);
            
            if(currentIndex === total - 1) {
                document.getElementById('btn-next').classList.add('hidden');
                document.getElementById('btn-submit').classList.remove('hidden');
            } else {
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('btn-submit').classList.add('hidden');
            }
        }

        function finish() {
            let correctCount = 0;
            let unanswered = 0;

            questions.forEach((item, index) => {
                if(userAnswers[index] === null) unanswered++;
                else if(userAnswers[index] === item.c) correctCount++;
            });

            if(unanswered > 0) {
                if(!confirm(`Tiene ${unanswered} preguntas sin responder en su hoja de respuestas. ¿Desea finalizar la evaluación técnica de todos modos?`)) {
                    return;
                }
            }

            document.getElementById('quiz-container').classList.add('hidden');
            const resDiv = document.getElementById('results');
            resDiv.classList.remove('hidden');

            const scoreVal = document.getElementById('score-val');
            scoreVal.innerText = `${correctCount} / ${questions.length}`;

            const pctScore = (correctCount / questions.length) * 100;
            const badge = document.getElementById('badge');
            const desc = document.getElementById('desc-val');

            if(pctScore >= 90) {
                badge.innerText = "Liniero Maestro / Supervisor Autorizado";
                badge.className = "inline-block px-6 py-3 rounded-xl font-bold text-xl mb-4 border-4 bg-green-100 text-green-800 border-green-400";
                desc.innerText = "Excelente desempeño técnico. Demuestra un dominio absoluto de normativas RETIE, CNEE y maniobras críticas en Redes de Media Tensión Aéreas.";
            } else if(pctScore >= 75) {
                badge.innerText = "Liniero Oficial Competente";
                badge.className = "inline-block px-6 py-3 rounded-xl font-bold text-xl mb-4 border-4 bg-blue-100 text-blue-800 border-blue-400";
                desc.innerText = "Aprobado. Posee los conocimientos requeridos para operar circuitos de media tensión respetando las distancias y los lineamientos de seguridad colectiva.";
            } else {
                badge.innerText = "Personal en Etapa de Inducción";
                badge.className = "inline-block px-6 py-3 rounded-xl font-bold text-xl mb-4 border-4 bg-red-100 text-red-800 border-red-400";
                desc.innerText = "Puntaje insuficiente para habilitación en caliente. Se recomienda revisar los manuales de herrajes, las 5 reglas de oro y las normativas vigentes.";
            }
        }

        // Inicializar el flujo al cargar la ventana
        window.onload = renderQuiz;
    </script>
